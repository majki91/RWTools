<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <title>Wesele K&K - Wrzuć zdjęcie!</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                text-align: center;
                background-color: #f9f6f0;
                color: #4a4a4a;
                padding: 20px;
            }
            .container {
                max-width: 400px;
                margin: 50px auto;
                background: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }
            h1 {
                font-size: 24px;
                margin-bottom: 1px;
                color: #8d7053;
            }
            h2 {
                font-size: 20px;
                color: #8d7053;
                margin-bottom: 0;
            }
            h3 {
                margin-top: 0;
                font-size: 16px;
                color: #8d7053;
            }
            p {
                font-size: 14px;
                margin-bottom: 25px;
            }
            .btn-select {
                background-color: #8d7053;
                color: white;
                padding: 12px 20px;
                border-radius: 25px;
                cursor: pointer;
                display: inline-block;
                font-weight: bold;
                margin-bottom: 15px;
            }
            #uploadBtn {
                background-color: #0a31ff;
                color: white;
                border: none;
                padding: 12px 30px;
                border-radius: 25px;
                font-weight: bold;
                cursor: pointer;
                display: none;
            }
            #status {
                margin-top: 20px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>📸 Ślubny Album Gości</h1>
            <h2>💝Karolina & Krystian💝</h2>
            <h3>18.07.2026r.</h3>
            <p>
                Zrób zdjęcie lub wybierz z galerii i podziel się z nami pięknymi
                wspomnieniami!
            </p>

            <form id="weddingForm">
                <input
                    type="file"
                    id="fileInput"
                    accept="image/*"
                    style="display: none"
                    multiple="true"
                />

                <label for="fileInput" class="btn-select"
                    >👉 Wybierz lub zrób zdjęcie📱</label
                >

                <div
                    id="fileName"
                    style="margin-bottom: 15px; font-style: italic"
                ></div>
                <button
                    type="submit"
                    id="uploadBtn"
                    disabled
                    style="display: inline-block; background-color: #cccccc"
                >
                    🎉 Wyślij do zdjęcie do naszego albumu 💌
                </button>
            </form>

            <div id="status"></div>
        </div>

        <script>
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileNameDiv = document.getElementById("fileName");
    const statusDiv = document.getElementById("status");
    const form = document.getElementById("weddingForm");

   
    fileInput.addEventListener("change", () => {
        const filesCount = fileInput.files.length;
        if (filesCount > 0) {
            if (filesCount === 1) {
                fileNameDiv.innerText = "Wybrano: " + fileInput.files[0].name;
            } else {
                fileNameDiv.innerText = "Wybrano zdjęć: " + filesCount;
            }
            uploadBtn.disabled = false;
            uploadBtn.style.backgroundColor = "#28a745";
            uploadBtn.style.display = "block";
        }
    });

    form.addEventListener("submit", async e => {
        e.preventDefault();

        const files = fileInput.files;
        if (files.length === 0) return;

        uploadBtn.disabled = true;
        let successCount = 0;


        for (let i = 0; i < files.length; i++) {

            statusDiv.innerHTML = `Wysyłanie zdjęcia ${i + 1} z ${files.length}... Proszę nie zamykać strony. ⏳`;
            statusDiv.style.color = "#333";

            const formData = new FormData();
            formData.append("photo", files[i]); 

            try {
                const response = await fetch("upload.php", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    successCount++;
                } else {
                    console.error(`Błąd przy wysyłaniu pliku: ${files[i].name}`);
                }
            } catch (error) {
                console.error("Błąd połączenia z serwerem przy pliku: " + files[i].name);
            }
        }


        if (successCount === files.length) {
            statusDiv.innerHTML = "Dziękujemy! Wszystkie zdjęcia zostały dodane do albumu. ❤️ 🎉";
            statusDiv.style.color = "green";
            form.reset();
            fileNameDiv.innerText = "";
            uploadBtn.style.display = "none";
        } else if (successCount > 0) {
            statusDiv.innerHTML = `Przesłano ${successCount} z ${files.length} zdjęć. Przy reszcie wystąpił błąd, spróbuj ponownie! ⚠️`;
            statusDiv.style.color = "orange";
            uploadBtn.disabled = false;
        } else {
            statusDiv.innerHTML = "Coś poszło nie tak. Serwer odrzucił pliki. Spróbuj jeszcze raz! 😢";
            statusDiv.style.color = "red";
            uploadBtn.disabled = false;
        }
    });
</script>

    </body>
</html>
